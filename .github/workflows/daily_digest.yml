name: Daily Portfolio Digest

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "调仓回溯日历天数（正常 2；测试可设 365）"
        required: false
        default: "2"
      stock_query:
        description: "查询股票（输入名称或代码如 铖昌科技/001270，留空则跑每日摘要）"
        required: false
        default: ""
  schedule:
    - cron: "0 12 * * *"   # UTC 12:00 = 北京时间 20:00
  repository_dispatch:
    types: [run_digest]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore digest state
        id: cache_state
        uses: actions/cache@v4
        with:
          path: daily_digest/daily_digest_state.json
          key: daily-digest-state-v5
          restore-keys: |
            daily-digest-state-v5
            daily-digest-state-v4
            daily-digest-state-v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f
          python -m pip install --upgrade pip
          pip install -r daily_digest/requirements.txt
          pip install -r backend/requirements.txt
          playwright install --with-deps chromium

      - name: Run daily digest
        env:
          XUEQIU_COOKIE: ${{ secrets.XUEQIU_COOKIE }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_KEYWORD: ${{ secrets.DINGTALK_KEYWORD }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET_NAME: ${{ secrets.OSS_BUCKET_NAME }}
          OSS_CUSTOM_DOMAIN: ${{ secrets.OSS_CUSTOM_DOMAIN }}
          ACCOUNT_DASHBOARD_DATABASE_URL: ${{ secrets.ACCOUNT_DASHBOARD_DATABASE_URL }}
          IMG_BB_API_KEY: ${{ secrets.IMG_BB_API_KEY }}
          DIGEST_PUSH_MODE: image
          DIGEST_LOOKBACK_DAYS: ${{ inputs.lookback_days || '2' }}
          STOCK_QUERY: ${{ inputs.stock_query || '' }}
        run: |
          set -euo pipefail
          export DEEPSEEK_BASE_URL="${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
          STOCK_QUERY="${{ inputs.stock_query || '' }}"
          if [ -n "${STOCK_QUERY}" ]; then
            echo "stock_query 模式: ${STOCK_QUERY}"
            python daily_digest/daily_portfolio_digest.py --stock-query "${STOCK_QUERY}"
          else
            echo "每日摘要模式"
            python daily_digest/daily_portfolio_digest.py
          fi
