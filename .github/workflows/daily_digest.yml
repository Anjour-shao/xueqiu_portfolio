name: Daily Portfolio Digest

on:
  schedule:
    # UTC 12:30 = 北京时间 20:30（晚上 8 点半）
    - cron: "30 12 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore digest state
        uses: actions/cache@v4
        with:
          path: daily_digest_state.json
          key: daily-digest-state-v3
          restore-keys: |
            daily-digest-state-v3
            daily-digest-state-v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f
          python -m pip install --upgrade pip
          pip install -r daily_digest_requirements.txt
          playwright install chromium

      - name: Run daily digest
        env:
          XUEQIU_COOKIE: ${{ secrets.XUEQIU_COOKIE }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_KEYWORD: ${{ secrets.DINGTALK_KEYWORD }}
          IMG_BB_API_KEY: ${{ secrets.IMG_BB_API_KEY }}
          DIGEST_PUSH_MODE: image
        run: |
          export DEEPSEEK_BASE_URL="${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
          python daily_portfolio_digest.py

      - name: Save digest state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: daily_digest_state.json
          key: daily-digest-state-v3
