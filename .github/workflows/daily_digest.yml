name: Daily Portfolio Digest

on:
  schedule:
    # UTC 0:00 = 北京时间 8:00（夏令时期间若差 1 小时可改为 0 1 * * *）
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore digest state
        uses: actions/cache@v4
        with:
          path: daily_digest_state.json
          key: daily-digest-state-v3
          restore-keys: |
            daily-digest-state-v3
            daily-digest-state-v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r daily_digest_requirements.txt

      - name: Run daily digest
        env:
          XUEQIU_COOKIE: ${{ secrets.XUEQIU_COOKIE }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_KEYWORD: ${{ secrets.DINGTALK_KEYWORD }}
        run: python daily_portfolio_digest.py

      - name: Save digest state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: daily_digest_state.json
          key: daily-digest-state-v3
