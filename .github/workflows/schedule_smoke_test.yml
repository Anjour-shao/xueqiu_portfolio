# 用于验证 GitHub Actions「定时触发」是否正常（与 Digest 业务无关）。
# 验证完成后请删除本文件，或去掉 schedule 仅保留 workflow_dispatch。
name: Schedule Smoke Test

on:
  schedule:
    # 每 5 分钟一次（GitHub cron 最小粒度为 5 分钟）
    - cron: "*/5 * * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report trigger info
        run: |
          echo "=== Schedule Smoke Test ==="
          echo "github.event_name=${{ github.event_name }}"
          echo "github.workflow=${{ github.workflow }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "runner.os=$(uname -a)"
          echo "beijing_time=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "utc_time=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "RESULT=OK — 定时触发成功"
          else
            echo "RESULT=手动触发（workflow_dispatch）"
          fi
