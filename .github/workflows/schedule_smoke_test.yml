# 验证 GitHub「schedule 定时」是否对该仓库生效。验证完请删除本文件。
name: Schedule Smoke Test

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/schedule_smoke_test.yml
  schedule:
    # 避开整点/每 5 分高峰（GitHub 可能丢队列），用 3/13/23/33/43/53 分
    - cron: "3,13,23,33,43,53 * * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report trigger info
        run: |
          echo "=== Schedule Smoke Test ==="
          echo "github.event_name=${{ github.event_name }}"
          echo "github.workflow=${{ github.workflow }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "beijing_time=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "utc_time=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          case "${{ github.event_name }}" in
            schedule) echo "RESULT=OK — 定时 schedule 已触发" ;;
            push) echo "RESULT=push 触发（说明 workflow 已在 main，仅 schedule 可能仍被禁用）" ;;
            *) echo "RESULT=手动 workflow_dispatch" ;;
          esac
