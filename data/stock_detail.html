<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个股观点追踪</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --text2: #86868b; --text3: #6e6e73;
  --border: #e5e5ea; --blue: #0071e3; --blue-bg: #e8f2fd; --green: #34c759;
  --red: #ff3b30; --orange: #ff9500; --r: 16px; --sh: 0 2px 12px rgba(0,0,0,.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; display: flex; min-height: 100vh; }

/* ---- Sidebar ---- */
.sidebar { width: 280px; min-width: 280px; background: rgba(255,255,255,.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; z-index: 10; }
.sb-hd { padding: 24px 20px 12px; }
.sb-hd h2 { font-size: 19px; font-weight: 700; }
.sb-hd p { font-size: 12px; color: var(--text2); margin-top: 3px; }
.sb-srch { margin: 10px 16px; position: relative; }
.sb-srch input { width: 100%; padding: 9px 12px 9px 32px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; background: var(--bg); color: var(--text); outline: none; transition: all .2s; }
.sb-srch input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,113,227,.12); }
.sb-srch .ic { position: absolute; left: 10px; top: 9px; font-size: 13px; }
.sb-list { flex: 1; overflow-y: auto; padding: 6px 10px; }
.sb-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: all .12s; margin-bottom: 1px; }
.sb-item:hover { background: var(--blue-bg); }
.sb-item.on { background: var(--blue); color: #fff; }
.sb-item .sbn { font-size: 13px; font-weight: 500; }
.sb-item .sbc { font-size: 11px; color: var(--text2); margin-left: 6px; }
.sb-item.on .sbc { color: rgba(255,255,255,.7); }
.sb-item .sbb { font-size: 10px; background: var(--bg); color: var(--text2); padding: 2px 7px; border-radius: 10px; }
.sb-item.on .sbb { background: rgba(255,255,255,.2); color: #fff; }
.sb-more { padding: 10px; text-align: center; font-size: 12px; color: var(--blue); cursor: pointer; }
.sb-more:hover { text-decoration: underline; }

/* ---- Main ---- */
.main { flex: 1; overflow-y: auto; padding: 28px 36px; }
.empty-state { text-align: center; padding: 100px 20px; color: var(--text2); }
.empty-state .es-icon { font-size: 52px; margin-bottom: 16px; opacity: .35; }
.empty-state h3 { font-size: 20px; color: var(--text); margin-bottom: 8px; font-weight: 600; }
.empty-state p { font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.5; }

/* Hero */
.hero { background: var(--card); border-radius: var(--r); padding: 24px 28px; margin-bottom: 20px; box-shadow: var(--sh); display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
.hero .avatar { width: 52px; height: 52px; border-radius: 13px; background: linear-gradient(135deg, #0071e3, #5ac8fa); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; letter-spacing: 1px; flex-shrink: 0; }
.hero .hi h1 { font-size: 24px; font-weight: 700; }
.hero .hi .sub { font-size: 13px; color: var(--text2); margin-top: 3px; }
.hero .hm { display: flex; gap: 28px; margin-left: auto; flex-wrap: wrap; }
.hero .hm .mv { font-size: 24px; font-weight: 700; }
.hero .hm .ml { font-size: 11px; color: var(--text2); margin-top: 2px; }
.g { color: var(--green); } .r { color: var(--red); }

/* Cards */
.card { background: var(--card); border-radius: var(--r); padding: 22px 26px; margin-bottom: 18px; box-shadow: var(--sh); }
.card h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.chart { width: 100%; height: 420px; }

/* Mention list */
.m-item { padding: 16px 20px; border-radius: 12px; margin-bottom: 10px; transition: all .2s; border: 1px solid transparent; cursor: pointer; background: var(--card); }
.m-item:hover { border-color: var(--border); box-shadow: 0 2px 8px rgba(0,0,0,.04); }
.m-item.highlight { border-color: var(--blue); background: var(--blue-bg); animation: hlPulse .6s ease-out; }
@keyframes hlPulse { 0% { transform: scale(1.02); } 100% { transform: scale(1); } }
.m-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.m-date { font-size: 13px; font-weight: 600; color: var(--text); }
.m-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.t-bull { background: #e8f8ed; color: #1a7d3c; }
.t-hbull { background: #1a7d3c; color: #fff; }
.t-bear { background: #fde8e8; color: #b91c1c; }
.t-neut { background: #f0f0f5; color: #6e6e73; }
.t-short { background: #fff3e0; color: #b85e00; }
.t-mid { background: #e8f2fd; color: #005bb5; }
.t-long { background: #f0e8fd; color: #5b2d8e; }
.m-body { display: flex; gap: 16px; }
.m-orig, .m-sum { flex: 1; font-size: 13px; line-height: 1.6; color: var(--text); }
.m-sum { color: var(--text3); }
.m-label { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.m-logic { font-size: 11px; color: var(--text2); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }

/* Pagination */
.pg { display: flex; justify-content: center; gap: 6px; margin-top: 16px; }
.pg button { padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px; background: #fff; color: var(--blue); font-size: 13px; cursor: pointer; transition: all .15s; }
.pg button:hover { background: var(--blue-bg); border-color: var(--blue); }
.pg button:disabled { color: var(--text2); cursor: default; background: var(--bg); border-color: var(--border); }
.pg .pg-info { padding: 7px 10px; font-size: 13px; color: var(--text2); }

@media (max-width: 800px) {
  body { flex-direction: column; }
  .sidebar { width: 100%; min-width: 0; max-height: 280px; }
  .main { padding: 16px; }
  .m-body { flex-direction: column; }
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-hd"><h2>📊 个股追踪</h2><p>直到一万点 · 2025.01 ~ 2026.01</p></div>
  <div class="sb-srch"><span class="ic">🔍</span><input type="text" id="sbSearch" placeholder="搜索股票..." oninput="renderSidebar()"></div>
  <div class="sb-list" id="sbList"></div>
  <div class="sb-more" id="sbMore" onclick="toggleShowAll()"></div>
</aside>

<main class="main" id="main"><div class="empty-state"><div class="es-icon">📈</div><h3>选择一只股票</h3><p>从左侧选择股票，查看股价走势、上证基准对比及每次提及的原文分析</p></div></main>

<script>
// ===== State =====
let allStocks = [], curStock = null, curData = null;
let chartInst = null;
const PAGE_SIZE = 25, SIDEBAR_INIT = 60;
let showAllSidebar = false, mentionPage = 0;

// ===== Init =====
fetch('/api/stocks').then(r=>r.json()).then(d=>{ allStocks=d; renderSidebar(); }).catch(e=>console.error(e));

// ===== Sidebar =====
function renderSidebar() {
  const q = document.getElementById('sbSearch').value.trim().toLowerCase();
  let list = q ? allStocks.filter(s=>s.name.toLowerCase().includes(q)||s.code.includes(q)) : allStocks;
  const total = list.length;
  if (!q && !showAllSidebar) list = list.slice(0, SIDEBAR_INIT);
  document.getElementById('sbList').innerHTML = list.map(s=>`
    <div class="sb-item${curStock&&curStock.code===s.code?' on':''}" onclick="selectStock('${s.code}')">
      <span><span class="sbn">${s.name}</span><span class="sbc">${s.code}</span></span>
      <span class="sbb">${s.mentions}次</span>
    </div>`).join('');
  const mb = document.getElementById('sbMore');
  if (!q && total > SIDEBAR_INIT) {
    mb.style.display = 'block';
    mb.textContent = showAllSidebar ? `收起（仅显示前 ${SIDEBAR_INIT} 只）` : `显示全部 ${total} 只股票 ↓`;
  } else { mb.style.display = 'none'; }
}
function toggleShowAll() { showAllSidebar = !showAllSidebar; renderSidebar(); }
document.getElementById('sbSearch').addEventListener('input', ()=>{ showAllSidebar = true; renderSidebar(); });

// ===== Select Stock =====
function selectStock(code) {
  curStock = allStocks.find(s=>s.code===code);
  renderSidebar();
  document.getElementById('main').innerHTML = '<div style="text-align:center;padding:80px;"><div style="width:24px;height:24px;border:2px solid #e5e5ea;border-top-color:#0071e3;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto;"></div><p style="color:#86868b;margin-top:12px;">加载中...</p></div>';
  fetch('/api/stock/'+code).then(r=>r.json()).then(d=>{ curData=d; mentionPage=0; renderDetail(d); }).catch(e=>{ document.getElementById('main').innerHTML='<div class="empty-state"><h3>加载失败</h3><p>'+e.message+'</p></div>'; });
}

// ===== Render Detail =====
function renderDetail(d) {
  const {name, code, prices, mentions} = d;
  if (!prices.length) { document.getElementById('main').innerHTML = '<div class="empty-state"><h3>无行情数据</h3></div>'; return; }

  const firstM = mentions.length ? mentions[0].date : '';
  const lastP = prices[prices.length-1];

  // Returns from first mention
  let stockRet=null, benchRet=null;
  if (firstM && prices.length>1) {
    const si = prices.findIndex(p=>p.date>=firstM);
    if (si>=0 && si<prices.length-1) {
      const ps=prices[si].close, pb=prices[si].benchmark, pe=lastP.close, be=lastP.benchmark;
      if (ps&&pb&&pe&&be) { stockRet=(pe-ps)/ps*100; benchRet=(be-pb)/pb*100; }
    }
  }

  // Sentiment distribution
  const sentMap={};
  mentions.forEach(m=>{ const s=m.sentiment||'未明确'; sentMap[s]=(sentMap[s]||0)+1; });
  const topSent = Object.entries(sentMap).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('main').innerHTML = `
    <div class="hero">
      <div class="avatar">${name.charAt(0)}</div>
      <div class="hi"><h1>${name}</h1><div class="sub">${code} · 首次提及 ${firstM||'?'} · 共计 ${mentions.length} 次</div></div>
      <div class="hm">
        <div><div class="mv${stockRet!=null?(stockRet>=0?' g':' r'):''}">${stockRet!=null?(stockRet>=0?'+':'')+stockRet.toFixed(1)+'%':'N/A'}</div><div class="ml">个股收益（首次提及至今）</div></div>
        <div><div class="mv${benchRet!=null?(benchRet>=0?' g':' r'):''}">${benchRet!=null?(benchRet>=0?'+':'')+benchRet.toFixed(1)+'%':'N/A'}</div><div class="ml">上证基准（同期）</div></div>
        <div><div class="mv">${topSent?topSent[0]:'-'}</div><div class="ml">主要态度</div></div>
      </div>
    </div>
    <div class="card"><h3>📈 股价走势 · 提及标记</h3><div class="chart" id="chartMain"></div></div>
    <div class="card" id="mentionsCard"><h3>💬 提及记录</h3><div id="mentionList"></div><div class="pg" id="mentionPg"></div></div>
  `;

  renderChart(d, firstM);
  renderMentions(mentions);
}

// ===== Chart =====
function renderChart(d, firstM) {
  const {prices, mentions} = d;
  const fp = prices.filter(p=>p.date>='2024-12-15');
  if (!fp.length) return;

  const basePrice=fp[0].close, baseBench=fp[0].benchmark;
  const dates=fp.map(p=>p.date);
  const stockData=fp.map(p=>basePrice?+(p.close/basePrice*100).toFixed(2):null);
  const benchData=fp.map(p=>baseBench?+(p.benchmark/baseBench*100).toFixed(2):null);

  // Build mention markers with date → mention index mapping
  const dateToMentions = {};
  mentions.forEach((m,i)=>{ if(!dateToMentions[m.date]) dateToMentions[m.date]=[]; dateToMentions[m.date].push({...m, idx: i}); });

  // Mark points: show markers at mention dates
  const markData = [];
  mentions.forEach((m,i)=>{
    const didx = dates.indexOf(m.date);
    if (didx<0 || stockData[didx]==null) return;
    const isBull = m.sentiment.includes('看好') && !m.sentiment.includes('看空');
    const isBear = m.sentiment.includes('看空') || m.sentiment.includes('谨慎');
    const isStrong = m.sentiment.includes('强烈');
    markData.push({
      value: [m.date, stockData[didx]],
      symbol: isStrong ? 'pin' : 'circle',
      symbolSize: isStrong ? 28 : (isBull||isBear ? 12 : 7),
      itemStyle: {
        color: isBull ? '#0071e3' : (isBear ? '#ff3b30' : '#aeaeb2'),
        borderColor: '#fff', borderWidth: 1.5,
        shadowBlur: isStrong ? 8 : 0, shadowColor: 'rgba(0,0,0,.2)',
      },
      mentionIdx: i,
      emphasis: { scale: 2.5, itemStyle: { borderWidth: 3 } },
      z: 5 + (isStrong ? 5 : 0),
    });
  });

  // Mark lines for first mention + strongest sentiment mentions
  const markLines = [];
  if (firstM && dates.includes(firstM)) {
    markLines.push({ name: '首次提及', xAxis: firstM, lineStyle: { color: '#0071e3', type: 'dashed', width: 1 }, label: { show: true, formatter: '首次', position: 'start', fontSize: 11, color: '#0071e3' } });
  }

  const option = {
    backgroundColor: '#fff',
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(255,255,255,.97)',
      borderColor: '#e5e5ea', borderRadius: 10,
      textStyle: { color: '#1d1d1f', fontSize: 12 },
      formatter: function(params) {
        if (!params||!params.length) return '';
        const date = params[0].axisValue;
        let h = `<b style="font-size:13px;">${date}</b><br/>`;
        params.forEach(p=>{ if(p.seriesName!=='提及') h += `${p.marker} ${p.seriesName}: <b>${p.value!=null?p.value.toFixed(1):'N/A'}</b><br/>`; });
        const ms = dateToMentions[date];
        if (ms&&ms.length) {
          h += '<div style="margin-top:6px;padding-top:6px;border-top:1px solid #e5e5ea;max-width:320px;">';
          ms.forEach(m=>h+=`<span style="font-size:11px;color:#0071e3;">📌 ${m.sentiment}</span> <span style="font-size:11px;">${(m.summary||m.text).slice(0,70)}...</span><br/>`);
          h += '<span style="font-size:10px;color:#86868b;">🖱 点击图钉跳转到详情</span></div>';
        }
        return h;
      },
    },
    grid: { left: 55, right: 30, top: 25, bottom: 35 },
    xAxis: { type: 'category', data: dates, boundaryGap: false, axisLine: { lineStyle: { color: '#e5e5ea' } }, axisLabel: { color: '#aeaeb2', fontSize: 10, formatter: v=>v.slice(5) }, axisTick: { show: false } },
    yAxis: { type: 'value', name: '基准 100', nameTextStyle: { color: '#aeaeb2', fontSize: 10 }, axisLine: { show: false }, axisTick: { show: false }, splitLine: { lineStyle: { color: '#f0f0f5' } }, axisLabel: { color: '#aeaeb2', fontSize: 10 } },
    series: [
      { name: '上证指数', type: 'line', data: benchData, smooth: true, symbol: 'none', lineStyle: { color: '#d1d1d6', width: 1.5 }, z: 1 },
      { name: name, type: 'line', data: stockData, smooth: true, symbol: 'none', lineStyle: { color: '#0071e3', width: 2.5 }, areaStyle: { color: { type: 'linear', x:0,y:0,x2:0,y2:1, colorStops: [{offset:0,color:'rgba(0,113,227,.12)'},{offset:1,color:'rgba(0,113,227,0)'}] } }, z: 2 },
      { name: '提及', type: 'scatter', data: markData, z: 10, markLine: markLines.length ? { silent: true, symbol: 'none', data: markLines } : undefined },
    ],
    legend: { bottom: 0, textStyle: { color: '#aeaeb2', fontSize: 11 }, data: [name, '上证指数'] },
  };

  const dom = document.getElementById('chartMain');
  if (chartInst) chartInst.dispose();
  chartInst = echarts.init(dom);
  chartInst.setOption(option);

  // Click marker → scroll to mention
  chartInst.on('click', function(params) {
    if (params.seriesName === '提及' && params.data && params.data.mentionIdx != null) {
      const idx = params.data.mentionIdx;
      mentionPage = Math.floor(idx / PAGE_SIZE);
      renderMentions(mentions);
      setTimeout(()=>{ const el=document.getElementById('m-'+idx); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('highlight'); setTimeout(()=>el.classList.remove('highlight'), 1500); } }, 100);
    }
  });

  window.addEventListener('resize', ()=>chartInst&&chartInst.resize());
}

// ===== Mention List =====
function renderMentions(mentions) {
  const total = mentions.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = mentionPage * PAGE_SIZE;
  const page = mentions.slice().reverse().slice(start, start + PAGE_SIZE);
  const actualIdx = (m)=>total-1 - mentions.indexOf(m); // index in original (ascending) order

  document.getElementById('mentionList').innerHTML = page.map(m=>{
    const origIdx = actualIdx(m);
    const sCls = m.sentiment.includes('强烈看好')?'t-hbull':(m.sentiment.includes('看好')?'t-bull':(m.sentiment.includes('看空')||m.sentiment.includes('谨慎')?'t-bear':'t-neut'));
    const hCls = m.time_horizon.includes('短期')?'t-short':(m.time_horizon.includes('中期')?'t-mid':(m.time_horizon.includes('长期')?'t-long':'t-neut'));
    return `<div class="m-item" id="m-${origIdx}">
      <div class="m-hd">
        <span class="m-date">${m.date}</span>
        <div class="m-tags">
          <span class="tag ${sCls}">${m.sentiment||'未明确'}</span>
          <span class="tag ${hCls}">${m.time_horizon||'未明确'}</span>
        </div>
      </div>
      <div class="m-body">
        <div class="m-orig"><div class="m-label">原文</div>${escHtml(m.text).slice(0, 300)}</div>
        <div class="m-sum"><div class="m-label">AI 摘要</div>${escHtml(m.summary||'').slice(0, 300)||'(无)'}</div>
      </div>
      ${m.key_logic?`<div class="m-logic">📍 ${escHtml(m.key_logic).slice(0,200)}</div>`:''}
    </div>`;
  }).join('');

  // Pagination
  let pgHtml = '';
  if (totalPages > 1) {
    pgHtml += `<button ${mentionPage===0?'disabled':''} onclick="mentionPage=0;renderMentions(curData.mentions);document.getElementById('mentionsCard').scrollIntoView({behavior:'smooth'});">首页</button>`;
    pgHtml += `<button ${mentionPage===0?'disabled':''} onclick="mentionPage--;renderMentions(curData.mentions);document.getElementById('mentionsCard').scrollIntoView({behavior:'smooth'});">← 上一页</button>`;
    pgHtml += `<span class="pg-info">${mentionPage+1} / ${totalPages}</span>`;
    pgHtml += `<button ${mentionPage>=totalPages-1?'disabled':''} onclick="mentionPage++;renderMentions(curData.mentions);document.getElementById('mentionsCard').scrollIntoView({behavior:'smooth'});">下一页 →</button>`;
    pgHtml += `<button ${mentionPage>=totalPages-1?'disabled':''} onclick="mentionPage=${totalPages-1};renderMentions(curData.mentions);document.getElementById('mentionsCard').scrollIntoView({behavior:'smooth'});">末页</button>`;
  }
  document.getElementById('mentionPg').innerHTML = pgHtml;
}

function escHtml(s) { const d=document.createElement('div'); d.textContent=(s||''); return d.innerHTML; }
</script>
</body>
</html>
